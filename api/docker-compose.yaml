services:
  redis:
    image: docker.arvancloud.ir/redis:7-alpine
    restart: always
    command:
      - redis-server
      - --appendonly
      - yes
      - --save
      - "60"
      - "1000"
    volumes:
      - redis_data:/data

  backend:
    build: ./backend
    restart: always
    depends_on:
      - redis
    ports:
      - "8000:8000"

  worker:
    build: ./worker
    restart: always
    depends_on:
      - redis

  frontend:
    build: ./frontend
    restart: always
    ports:
      - "3000:80"

  nginx:
    image: docker.arvancloud.ir/nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  redis_data: